name: CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx
      - name: Run Pytest
        run: python -m pytest

  deploy:
    name: Build & Deploy to Cloud Run
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable Required Google Cloud APIs
        run: |
            gcloud services enable run.googleapis.com sqladmin.googleapis.com

      # 1. Configure Docker to authenticate against the Frankfurt Registry
      - name: Configure Docker for GCP
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev

      # 2. Build and Push the Docker Image using the europe-west3 prefix
      - name: Build and Push Docker Image
        run: |
          docker build -t europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/clinic-db/backend:latest .
          docker push europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/clinic-db/backend:latest

      # 3. Deploy live to Cloud Run in Frankfurt, mounting the local Cloud SQL instance
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy clinic-backend \
            --image=europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/clinic-db/backend:latest \
            --region=europe-west3 \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:europe-west3:clinic-db \
            --set-env-vars="DATABASE_URL=postgresql://postgres:${{ secrets.DB_PASSWORD }}@/clinic_db?host=/cloudsql/${{ secrets.GCP_PROJECT_ID }}:europe-west3:clinic-db"